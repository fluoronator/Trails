<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Map - Version 5</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* VERSION NUMBER */
#versionNumber {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 70px;
    font-weight: bold;
    color: white;
    z-index: 1000;
    pointer-events: none;
}

/* Elevation display */
#elevationBox {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 32px;
    font-weight: bold;
    color: white;
    z-index: 1000;
    background: rgba(0,0,0,0.4);
    padding: 10px 16px;
    border-radius: 12px;
}

/* This rotates */
#mapWrapper {
    position: fixed;
    width: 100vw;
    height: 100vh;
    transform-origin: center center;
}

/* Oversized square map */
#map {
    position: absolute;
    width: 200vmax;
    height: 200vmax;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

.leaflet-control-zoom {
    display: none;
}
</style>
</head>
<body>

<div id="versionNumber">5</div>
<div id="elevationBox">Elevation: -- ft</div>

<div id="mapWrapper">
    <div id="map"></div>
</div>

<script>
let map = L.map('map', {
    zoomControl: false,
    attributionControl: false
}).setView([0,0], 18);

// OpenStreetMap tiles
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// ===== Load GeoJSON from your repo =====
fetch('/data/trails.geojson')
    .then(response => response.json())
    .then(data => {
        L.geoJSON(data, {
            style: {
                color: "#00ff88",
                weight: 4
            }
        }).addTo(map);
    })
    .catch(err => console.log("GeoJSON load error:", err));


// Blue dot
let userMarker = L.circleMarker([0,0], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: '#007aff',
    fillOpacity: 1
}).addTo(map);

// Accuracy circle
let accuracyCircle = L.circle([0,0], {
    radius: 0,
    color: '#007aff',
    fillColor: '#007aff',
    fillOpacity: 0.15,
    weight: 1
}).addTo(map);

// Elevation display
let elevationBox = document.getElementById("elevationBox");

// Track location
navigator.geolocation.watchPosition(position => {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const accuracy = position.coords.accuracy;
    const altitudeMeters = position.coords.altitude;

    userMarker.setLatLng([lat, lon]);
    accuracyCircle.setLatLng([lat, lon]);
    accuracyCircle.setRadius(accuracy);

    map.setView([lat, lon], 18);

    // Convert meters to feet
    if (altitudeMeters !== null) {
        let altitudeFeet = altitudeMeters * 3.28084;
        elevationBox.innerHTML = "Elevation: " + altitudeFeet.toFixed(0) + " ft";
    }

}, error => {
    alert("Location permission required.");
}, {
    enableHighAccuracy: true
});

// ===== ROTATION =====
let mapWrapper = document.getElementById("mapWrapper");

function rotateMap(deg) {
    mapWrapper.style.transform = "rotate(" + (-deg) + "deg)";
}

// Orientation permission (iPhone)
window.onload = function() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.body.addEventListener("click", function() {
            DeviceOrientationEvent.requestPermission()
            .then(function(permissionState) {
                if (permissionState === 'granted') {
                    window.addEventListener("deviceorientation", handleOrientation);
                }
            });
        }, { once: true });
    } else {
        window.addEventListener("deviceorientation", handleOrientation);
    }
};

function handleOrientation(event) {

    let heading;

    if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading;
    }
    else if (event.alpha !== null) {
        heading = 360 - event.alpha;
    }

    if (heading !== undefined) {
        rotateMap(heading);
    }
}
</script>

</body>
</html>
